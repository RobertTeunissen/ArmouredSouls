name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Set minimal permissions by default, override per job if needed
permissions:
  contents: read

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: prototype/backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./prototype/backend
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./prototype/backend
        run: npm run prisma:generate
      
      - name: Lint backend code
        working-directory: ./prototype/backend
        run: npm run lint
      
      - name: Build backend
        working-directory: ./prototype/backend
        run: npm run build
      
      - name: Run unit tests
        working-directory: ./prototype/backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
        run: npm run test:unit -- --silent

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armouredsouls_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=256mb
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: prototype/backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./prototype/backend
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./prototype/backend
        run: npm run prisma:generate
      
      - name: Run database migrations
        working-directory: ./prototype/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_test?connection_limit=5
        run: npx prisma migrate deploy
      
      - name: Run integration tests
        working-directory: ./prototype/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_test?connection_limit=5
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test
        run: npm run test:integration -- --silent 2>&1 | tail -n 500

  frontend-tests:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write  # For PR comments if needed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: prototype/frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./prototype/frontend
        run: npm ci
      
      - name: Lint frontend code
        working-directory: ./prototype/frontend
        run: npm run lint
      
      - name: Build frontend
        working-directory: ./prototype/frontend
        run: npm run build

      - name: Run frontend unit tests
        working-directory: ./prototype/frontend
        run: npx vitest --run

      # Note: E2E tests (Playwright) are skipped in CI because they require
      # a running backend with a seeded database. Run locally before pushing:
      #   cd prototype/frontend && npm run test:e2e

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write  # For security scanning results
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'
      
      - name: Audit backend dependencies
        working-directory: ./prototype/backend
        run: npm audit --audit-level=moderate || true
      
      - name: Audit frontend dependencies
        working-directory: ./prototype/frontend
        run: npm audit --audit-level=moderate || true
