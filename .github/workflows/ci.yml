name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Set minimal permissions by default, override per job if needed
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate
      
      - name: Lint backend code
        working-directory: ./app/backend
        run: npm run lint
      
      - name: Build backend
        working-directory: ./app/backend
        run: npm run build
      
      - name: Run unit tests
        working-directory: ./app/backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
        run: npm run test:unit -- --silent

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armouredsouls_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=256mb
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate
      
      - name: Run database migrations
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_test?connection_limit=5
        run: npx prisma migrate deploy
      
      - name: Run integration tests
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_test?connection_limit=5
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test
        run: npm run test:integration -- --silent 2>&1 | tail -n 500

  frontend-tests:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write  # For PR comments if needed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci
      
      - name: Lint frontend code
        working-directory: ./app/frontend
        run: npm run lint
      
      - name: Build frontend
        working-directory: ./app/frontend
        run: npm run build

      - name: Run frontend unit tests
        working-directory: ./app/frontend
        timeout-minutes: 15
        run: npx vitest --run --reporter=verbose

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-unit-tests, frontend-tests]

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armouredsouls_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=256mb
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            app/backend/package-lock.json
            app/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate

      - name: Run database migrations
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=5
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=5
        run: npx prisma db seed

      - name: Build backend
        working-directory: ./app/backend
        run: npm run build

      - name: Start backend server
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=5
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test
          PORT: 3001
          CORS_ORIGIN: http://localhost:4173
          SCHEDULER_ENABLED: false
        run: |
          node dist/index.js &
          echo "Waiting for backend to start..."
          backend_ready=false
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              backend_ready=true
              break
            fi
            sleep 1
          done
          if [ "$backend_ready" != "true" ]; then
            echo "Backend failed to become ready within 30 seconds"
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./app/frontend
        env:
          VITE_API_URL: http://localhost:3001
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ./app/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./app/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
        run: |
          npx vite preview --port 4173 &
          echo "Waiting for frontend preview server to start..."
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4173/ > /dev/null 2>&1; then
              echo "Frontend preview server is ready"
              break
            fi
            sleep 1
          done
          npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-html-report
          path: app/frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-failure-artifacts
          path: |
            app/frontend/test-results/
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write  # For security scanning results
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci

      - name: Generate audit report (backend)
        working-directory: ./app/backend
        run: npm audit --json > audit-report-backend.json || true

      - name: Generate audit report (frontend)
        working-directory: ./app/frontend
        run: npm audit --json > audit-report-frontend.json || true

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: security-audit-reports
          path: |
            app/backend/audit-report-backend.json
            app/frontend/audit-report-frontend.json

      - name: Check allowlist and audit backend
        working-directory: ./app/backend
        run: |
          # Run npm audit at high level — fail on high/critical vulnerabilities in production deps only
          # Dev dependencies are not deployed and don't affect the production attack surface
          # Known accepted vulnerabilities are documented in .security-audit-allowlist.json
          ALLOWLIST_FILE="../../.security-audit-allowlist.json"
          if [ -f "$ALLOWLIST_FILE" ]; then
            echo "Security audit allowlist found — reviewing accepted vulnerabilities"
            cat "$ALLOWLIST_FILE"
          fi
          npm audit --audit-level=high --omit=dev

      - name: Check allowlist and audit frontend
        working-directory: ./app/frontend
        run: |
          # Production deps only — dev tooling (vitest, mermaid, eslint) excluded
          ALLOWLIST_FILE="../../.security-audit-allowlist.json"
          if [ -f "$ALLOWLIST_FILE" ]; then
            echo "Security audit allowlist found — reviewing accepted vulnerabilities"
            cat "$ALLOWLIST_FILE"
          fi
          npm audit --audit-level=high --omit=dev
