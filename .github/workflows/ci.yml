name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

# Set minimal permissions by default, override per job if needed
permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate
      
      - name: Lint backend code
        working-directory: ./app/backend
        run: npm run lint
      
      - name: Build backend
        working-directory: ./app/backend
        run: npm run build
      
      - name: Run unit tests
        working-directory: ./app/backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
        run: npm run test:unit -- --silent

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write
    
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armouredsouls_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=256mb
        ports:
          - 5432:5432
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/backend/package-lock.json
      
      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci
      
      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate
      
      - name: Run database migrations
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_test?connection_limit=5
        run: npx prisma migrate deploy
      
      - name: Run integration tests
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_test?connection_limit=5
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test
        run: npm run test:integration -- --silent 2>&1 | tail -n 500

  frontend-tests:
    name: Frontend Tests & Lint
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      pull-requests: write  # For PR comments if needed
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: app/frontend/package-lock.json
      
      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci
      
      - name: Lint frontend code
        working-directory: ./app/frontend
        run: npm run lint
      
      - name: Build frontend
        working-directory: ./app/frontend
        run: npm run build

      - name: Run frontend unit tests
        working-directory: ./app/frontend
        timeout-minutes: 15
        run: npx vitest --run --reporter=verbose

  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-unit-tests, frontend-tests]
    # Run E2E even if frontend unit tests fail — but don't block merge
    # Only skip if backend-unit-tests failed (no point running E2E without a working backend)
    if: ${{ always() && needs['backend-unit-tests'].result == 'success' }}
    continue-on-error: true

    permissions:
      contents: read

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armouredsouls_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=256mb
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            app/backend/package-lock.json
            app/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate

      - name: Run database migrations
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=20
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=20
        run: npx prisma db seed

      - name: Build backend
        working-directory: ./app/backend
        run: npm run build

      - name: Start backend server
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=20
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test
          PORT: 3001
          CORS_ORIGIN: http://localhost:4173
          SCHEDULER_ENABLED: false
        run: |
          node dist/index.js &
          echo "Waiting for backend to start..."
          backend_ready=false
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              backend_ready=true
              break
            fi
            sleep 1
          done
          if [ "$backend_ready" != "true" ]; then
            echo "Backend failed to become ready within 30 seconds"
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./app/frontend
        env:
          VITE_API_URL: http://localhost:3001
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ./app/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./app/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
        run: |
          npx vite preview --port 4173 &
          echo "Waiting for frontend preview server to start..."
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4173/ > /dev/null 2>&1; then
              echo "Frontend preview server is ready"
              break
            fi
            sleep 1
          done
          npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-html-report
          path: app/frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-failure-artifacts
          path: |
            app/frontend/test-results/
          retention-days: 14

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      security-events: write  # For security scanning results
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci

      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci

      - name: Generate audit report (backend)
        working-directory: ./app/backend
        run: npm audit --json > audit-report-backend.json || true

      - name: Generate audit report (frontend)
        working-directory: ./app/frontend
        run: npm audit --json > audit-report-frontend.json || true

      - name: Upload audit reports
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: security-audit-reports
          path: |
            app/backend/audit-report-backend.json
            app/frontend/audit-report-frontend.json

      - name: Check allowlist and audit backend
        working-directory: ./app/backend
        run: |
          # Run npm audit at high level — fail on high/critical vulnerabilities in production deps only
          # Dev dependencies are not deployed and don't affect the production attack surface
          # Known accepted vulnerabilities are documented in .security-audit-allowlist.json
          ALLOWLIST_FILE="../../.security-audit-allowlist.json"
          if [ -f "$ALLOWLIST_FILE" ]; then
            echo "Security audit allowlist found — reviewing accepted vulnerabilities"
            cat "$ALLOWLIST_FILE"
          fi
          
          # Run audit and filter out allowlisted advisories
          AUDIT_OUTPUT=$(npm audit --json --omit=dev 2>/dev/null || true)
          
          if [ -f "$ALLOWLIST_FILE" ]; then
            # Extract allowlisted GHSA IDs
            ALLOWED_IDS=$(cat "$ALLOWLIST_FILE" | node -e "
              const data = JSON.parse(require('fs').readFileSync('/dev/stdin','utf8'));
              console.log(data.allowlist.map(e => e.id).join('\n'));
            ")
            
            # Check for non-allowlisted high/critical vulnerabilities
            UNALLOWED=$(echo "$AUDIT_OUTPUT" | node -e "
              const fs = require('fs');
              const input = fs.readFileSync('/dev/stdin', 'utf8');
              const audit = JSON.parse(input);
              const allowed = new Set(process.argv.slice(1));
              const vulns = audit.vulnerabilities || {};
              
              // Collect all direct advisory IDs for each package (recursive via resolution)
              function getAdvisoryIds(pkgName, visited = new Set()) {
                if (visited.has(pkgName)) return [];
                visited.add(pkgName);
                const info = vulns[pkgName];
                if (!info) return [];
                const ids = [];
                for (const v of (info.via || [])) {
                  if (typeof v === 'object' && v.url) {
                    ids.push(v.url.split('/').pop());
                  } else if (typeof v === 'string') {
                    ids.push(...getAdvisoryIds(v, visited));
                  }
                }
                return ids;
              }
              
              let found = false;
              for (const [name, info] of Object.entries(vulns)) {
                const severity = info.severity;
                if (severity !== 'high' && severity !== 'critical') continue;
                const advisoryIds = getAdvisoryIds(name);
                const allAllowed = advisoryIds.length > 0 && advisoryIds.every(id => allowed.has(id));
                if (!allAllowed) {
                  console.error('UNALLOWED: ' + name + ' (' + severity + ') — ' + advisoryIds.join(', '));
                  found = true;
                }
              }
              process.exit(found ? 1 : 0);
            " $ALLOWED_IDS)
            
            AUDIT_EXIT=$?
            if [ $AUDIT_EXIT -ne 0 ]; then
              echo "Security audit failed — unallowed high/critical vulnerabilities found"
              npm audit --audit-level=high --omit=dev
              exit 1
            else
              echo "Security audit passed — all high/critical vulnerabilities are allowlisted"
            fi
          else
            npm audit --audit-level=high --omit=dev
          fi

      - name: Check allowlist and audit frontend
        working-directory: ./app/frontend
        run: |
          # Production deps only — dev tooling (vitest, mermaid, eslint) excluded
          ALLOWLIST_FILE="../../.security-audit-allowlist.json"
          if [ -f "$ALLOWLIST_FILE" ]; then
            echo "Security audit allowlist found — reviewing accepted vulnerabilities"
            cat "$ALLOWLIST_FILE"
          fi
          npm audit --audit-level=high --omit=dev
