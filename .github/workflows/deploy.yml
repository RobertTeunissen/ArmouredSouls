name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        type: choice
        options:
          - acceptance
          - production

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1: Backend unit tests + property tests, frontend build + lint
  # ---------------------------------------------------------------------------
  backend-unit-tests:
    name: Backend Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate

      - name: Lint backend code
        working-directory: ./app/backend
        run: npm run lint || true

      - name: Build backend
        working-directory: ./app/backend
        run: npm run build

      - name: Run unit tests
        working-directory: ./app/backend
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
        run: npm run test:unit -- --silent

  backend-integration-tests:
    name: Backend Integration Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armouredsouls_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=256mb
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate

      - name: Run database migrations
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_test?connection_limit=5
        run: npx prisma migrate deploy

      - name: Run integration tests
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_test?connection_limit=5
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test
        run: npm run test:integration -- --silent 2>&1 | tail -n 500 || true

  frontend-build:
    name: Frontend Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci

      - name: Lint frontend code
        working-directory: ./app/frontend
        run: npm run lint || true

      - name: Build frontend
        working-directory: ./app/frontend
        run: npm run build

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: frontend-build
          path: app/frontend/dist/
          retention-days: 1

  # ---------------------------------------------------------------------------
  # Stage 2: E2E tests (only on merge to main, after Stage 1 passes)
  # ---------------------------------------------------------------------------
  e2e-tests:
    name: E2E Tests (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [backend-unit-tests, frontend-build]
    # Run E2E even if frontend-build has issues — E2E is the deployment gate
    if: ${{ always() && needs['backend-unit-tests'].result == 'success' }}

    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: armouredsouls_e2e
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
          --shm-size=256mb
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            app/backend/package-lock.json
            app/frontend/package-lock.json

      - name: Install backend dependencies
        working-directory: ./app/backend
        run: npm ci

      - name: Generate Prisma Client
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
        run: npm run prisma:generate

      - name: Run database migrations
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=5
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=5
        run: npx prisma db seed

      - name: Build backend
        working-directory: ./app/backend
        run: npm run build

      - name: Start backend server
        working-directory: ./app/backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/armouredsouls_e2e?connection_limit=5
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test
          PORT: 3001
          CORS_ORIGIN: http://localhost:4173
          SCHEDULER_ENABLED: false
        run: |
          node dist/index.js &
          echo "Waiting for backend to start..."
          backend_ready=false
          for i in $(seq 1 30); do
            if curl -s http://localhost:3001/api/health > /dev/null 2>&1; then
              echo "Backend is ready"
              backend_ready=true
              break
            fi
            sleep 1
          done
          if [ "$backend_ready" != "true" ]; then
            echo "Backend failed to become ready within 30 seconds"
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: ./app/frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./app/frontend
        env:
          VITE_API_URL: http://localhost:3001
        run: npm run build

      - name: Install Playwright browsers
        working-directory: ./app/frontend
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: ./app/frontend
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:4173
        run: |
          npx vite preview --port 4173 &
          echo "Waiting for frontend preview server to start..."
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:4173/ > /dev/null 2>&1; then
              echo "Frontend preview server is ready"
              break
            fi
            sleep 1
          done
          npx playwright test

      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-html-report
          path: app/frontend/playwright-report/
          retention-days: 14

      - name: Upload Playwright failure artifacts
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-failure-artifacts
          path: |
            app/frontend/test-results/
          retention-days: 14

  # ---------------------------------------------------------------------------
  # ACC deployment — auto-deploy on push to main (after all tests pass)
  # ---------------------------------------------------------------------------
  deploy-acc:
    name: Deploy to Acceptance
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-build, e2e-tests]
    if: github.event_name == 'push'
    environment: acceptance

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.ACC_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.ACC_VPS_IP }} >> ~/.ssh/known_hosts

      - name: Transfer backend artifacts via rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='uploads' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/backend/ \
            ${{ secrets.ACC_VPS_USER }}@${{ secrets.ACC_VPS_IP }}:/opt/armouredsouls/backend/

      - name: Transfer frontend source files via rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='dist' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/frontend/ \
            ${{ secrets.ACC_VPS_USER }}@${{ secrets.ACC_VPS_IP }}:/opt/armouredsouls/frontend/

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v6
        with:
          name: frontend-build
          path: app/frontend/dist/

      - name: Transfer pre-built frontend to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/frontend/dist/ \
            ${{ secrets.ACC_VPS_USER }}@${{ secrets.ACC_VPS_IP }}:/opt/armouredsouls/frontend/dist/

      - name: Transfer shared utilities via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/shared/ \
            ${{ secrets.ACC_VPS_USER }}@${{ secrets.ACC_VPS_IP }}:/opt/armouredsouls/shared/

      - name: Transfer ecosystem config
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/ecosystem.config.js \
            ${{ secrets.ACC_VPS_USER }}@${{ secrets.ACC_VPS_IP }}:/opt/armouredsouls/

      - name: Transfer Caddyfile
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/Caddyfile \
            ${{ secrets.ACC_VPS_USER }}@${{ secrets.ACC_VPS_IP }}:/opt/armouredsouls/app/

      - name: Sync Caddyfile and reload Caddy
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ACC_VPS_IP }}
          username: ${{ secrets.ACC_VPS_USER }}
          key: ${{ secrets.ACC_SSH_KEY }}
          script: |
            # Copy repo Caddyfile to Caddy config if it differs
            REPO_CADDY="/opt/armouredsouls/app/Caddyfile"
            SYSTEM_CADDY="/etc/caddy/Caddyfile"
            if [ -f "$REPO_CADDY" ] && ! diff -q "$REPO_CADDY" "$SYSTEM_CADDY" > /dev/null 2>&1; then
              echo "Caddyfile changed — updating and reloading"
              sudo cp "$REPO_CADDY" "$SYSTEM_CADDY" && sudo systemctl reload caddy || echo "WARNING: Caddy reload failed — sudo may need passwordless config for deploy user"
            else
              echo "Caddyfile unchanged — skipping reload"
            fi

      - name: Install dependencies and build on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ACC_VPS_IP }}
          username: ${{ secrets.ACC_VPS_USER }}
          key: ${{ secrets.ACC_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/armouredsouls/backend
            npm install --prefer-offline
            npx prisma generate
            npm run build

      - name: Create pre-migration database backup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ACC_VPS_IP }}
          username: ${{ secrets.ACC_VPS_USER }}
          key: ${{ secrets.ACC_SSH_KEY }}
          script: |
            BACKUP_DIR="/opt/armouredsouls/backups"
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if command -v pg_dump &> /dev/null; then
              pg_dump -Fc "$DATABASE_URL" > "$BACKUP_DIR/pre_deploy_${TIMESTAMP}.dump"
              echo "Backup created: pre_deploy_${TIMESTAMP}.dump"
            else
              echo "pg_dump not available, skipping backup (use docker exec for manual backups)"
            fi

      - name: Run database migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ACC_VPS_IP }}
          username: ${{ secrets.ACC_VPS_USER }}
          key: ${{ secrets.ACC_SSH_KEY }}
          script: |
            cd /opt/armouredsouls/backend
            npx prisma migrate deploy

      - name: Seed database (weapons, facilities, essential data)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ACC_VPS_IP }}
          username: ${{ secrets.ACC_VPS_USER }}
          key: ${{ secrets.ACC_SSH_KEY }}
          script: |
            cd /opt/armouredsouls/backend
            NODE_ENV=acceptance npx prisma db seed

      - name: Prune dev dependencies
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ACC_VPS_IP }}
          username: ${{ secrets.ACC_VPS_USER }}
          key: ${{ secrets.ACC_SSH_KEY }}
          script: |
            cd /opt/armouredsouls/backend
            npm prune --production

      - name: Restart backend via PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ACC_VPS_IP }}
          username: ${{ secrets.ACC_VPS_USER }}
          key: ${{ secrets.ACC_SSH_KEY }}
          script: |
            cd /opt/armouredsouls
            pm2 restart ecosystem.config.js --update-env

      - name: Health check (30s timeout)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.ACC_VPS_IP }}
          username: ${{ secrets.ACC_VPS_USER }}
          key: ${{ secrets.ACC_SSH_KEY }}
          script: |
            TIMEOUT=30
            ELAPSED=0
            until curl -sf http://localhost:3001/api/health > /dev/null 2>&1; do
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Health check failed after ${TIMEOUT}s"
                exit 1
              fi
              sleep 2
              ELAPSED=$((ELAPSED + 2))
            done
            echo "Health check passed"

      - name: Generate changelog drafts
        continue-on-error: true
        env:
          CHANGELOG_API_URL: ${{ secrets.CHANGELOG_API_URL }}
          CHANGELOG_DEPLOY_TOKEN: ${{ secrets.CHANGELOG_DEPLOY_TOKEN }}
        run: npx ts-node app/backend/scripts/generate-changelog-drafts.ts

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ---------------------------------------------------------------------------
  # PRD deployment — manual trigger via workflow_dispatch (environment=production)
  # ---------------------------------------------------------------------------
  deploy-prd:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [backend-unit-tests, backend-integration-tests, frontend-build, e2e-tests]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24'

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PRD_VPS_IP }} >> ~/.ssh/known_hosts

      - name: Transfer backend artifacts via rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.env' \
            --exclude='uploads' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/backend/ \
            ${{ secrets.PRD_VPS_USER }}@${{ secrets.PRD_VPS_IP }}:/opt/armouredsouls/backend/

      - name: Transfer frontend source files via rsync
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='dist' \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/frontend/ \
            ${{ secrets.PRD_VPS_USER }}@${{ secrets.PRD_VPS_IP }}:/opt/armouredsouls/frontend/

      - name: Download frontend build artifacts
        uses: actions/download-artifact@v6
        with:
          name: frontend-build
          path: app/frontend/dist/

      - name: Transfer pre-built frontend to VPS
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/frontend/dist/ \
            ${{ secrets.PRD_VPS_USER }}@${{ secrets.PRD_VPS_IP }}:/opt/armouredsouls/frontend/dist/

      - name: Transfer shared utilities via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/shared/ \
            ${{ secrets.PRD_VPS_USER }}@${{ secrets.PRD_VPS_IP }}:/opt/armouredsouls/shared/

      - name: Transfer ecosystem config
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/ecosystem.config.js \
            ${{ secrets.PRD_VPS_USER }}@${{ secrets.PRD_VPS_IP }}:/opt/armouredsouls/

      - name: Transfer Caddyfile
        run: |
          rsync -avz \
            -e "ssh -i ~/.ssh/deploy_key" \
            ./app/Caddyfile \
            ${{ secrets.PRD_VPS_USER }}@${{ secrets.PRD_VPS_IP }}:/opt/armouredsouls/app/

      - name: Sync Caddyfile and reload Caddy
        continue-on-error: true
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRD_VPS_IP }}
          username: ${{ secrets.PRD_VPS_USER }}
          key: ${{ secrets.PRD_SSH_KEY }}
          script: |
            # Copy repo Caddyfile to Caddy config if it differs
            REPO_CADDY="/opt/armouredsouls/app/Caddyfile"
            SYSTEM_CADDY="/etc/caddy/Caddyfile"
            if [ -f "$REPO_CADDY" ] && ! diff -q "$REPO_CADDY" "$SYSTEM_CADDY" > /dev/null 2>&1; then
              echo "Caddyfile changed — updating and reloading"
              sudo cp "$REPO_CADDY" "$SYSTEM_CADDY" && sudo systemctl reload caddy || echo "WARNING: Caddy reload failed — sudo may need passwordless config for deploy user"
            else
              echo "Caddyfile unchanged — skipping reload"
            fi

      - name: Install dependencies and build on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRD_VPS_IP }}
          username: ${{ secrets.PRD_VPS_USER }}
          key: ${{ secrets.PRD_SSH_KEY }}
          command_timeout: 20m
          script: |
            cd /opt/armouredsouls/backend
            npm install --prefer-offline
            npx prisma generate
            npm run build

      - name: Create pre-migration database backup
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRD_VPS_IP }}
          username: ${{ secrets.PRD_VPS_USER }}
          key: ${{ secrets.PRD_SSH_KEY }}
          script: |
            BACKUP_DIR="/opt/armouredsouls/backups"
            mkdir -p "$BACKUP_DIR"
            TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            if command -v pg_dump &> /dev/null; then
              pg_dump -Fc "$DATABASE_URL" > "$BACKUP_DIR/pre_deploy_${TIMESTAMP}.dump"
              echo "Backup created: pre_deploy_${TIMESTAMP}.dump"
            else
              echo "pg_dump not available, skipping backup (use docker exec for manual backups)"
            fi

      - name: Run database migrations
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRD_VPS_IP }}
          username: ${{ secrets.PRD_VPS_USER }}
          key: ${{ secrets.PRD_SSH_KEY }}
          script: |
            cd /opt/armouredsouls/backend
            npx prisma migrate deploy

      - name: Prune dev dependencies
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRD_VPS_IP }}
          username: ${{ secrets.PRD_VPS_USER }}
          key: ${{ secrets.PRD_SSH_KEY }}
          script: |
            cd /opt/armouredsouls/backend
            npm prune --production

      - name: Restart backend via PM2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRD_VPS_IP }}
          username: ${{ secrets.PRD_VPS_USER }}
          key: ${{ secrets.PRD_SSH_KEY }}
          script: |
            cd /opt/armouredsouls
            pm2 restart ecosystem.config.js --update-env

      - name: Health check (30s timeout)
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PRD_VPS_IP }}
          username: ${{ secrets.PRD_VPS_USER }}
          key: ${{ secrets.PRD_SSH_KEY }}
          script: |
            TIMEOUT=30
            ELAPSED=0
            until curl -sf http://localhost:3001/api/health > /dev/null 2>&1; do
              if [ $ELAPSED -ge $TIMEOUT ]; then
                echo "Health check failed after ${TIMEOUT}s"
                exit 1
              fi
              sleep 2
              ELAPSED=$((ELAPSED + 2))
            done
            echo "Health check passed"

      - name: Generate changelog drafts
        continue-on-error: true
        env:
          CHANGELOG_API_URL: ${{ secrets.CHANGELOG_API_URL }}
          CHANGELOG_DEPLOY_TOKEN: ${{ secrets.CHANGELOG_DEPLOY_TOKEN }}
        run: npx ts-node app/backend/scripts/generate-changelog-drafts.ts

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ---------------------------------------------------------------------------
  # Post-deployment smoke tests — ACC
  # ---------------------------------------------------------------------------
  smoke-test-acc:
    name: Smoke Tests (Acceptance)
    runs-on: ubuntu-latest
    needs: deploy-acc
    if: github.event_name == 'push'
    environment: acceptance

    steps:
      - name: Verify health endpoint returns 200
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://acc.armouredsouls.com/api/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health endpoint returned $HTTP_STATUS (expected 200)"
            exit 1
          fi
          echo "Health endpoint OK (200)"

      - name: Verify frontend loads (HTTP 200 on /)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://acc.armouredsouls.com/")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Frontend returned $HTTP_STATUS (expected 200)"
            exit 1
          fi
          echo "Frontend OK (200)"

      - name: Verify login API endpoint responds
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.invalid","password":"smoketest"}' \
            "https://acc.armouredsouls.com/api/auth/login")
          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "Login API returned $HTTP_STATUS (server error)"
            exit 1
          fi
          echo "Login API responding (HTTP $HTTP_STATUS)"

  # ---------------------------------------------------------------------------
  # Post-deployment smoke tests — PRD
  # ---------------------------------------------------------------------------
  smoke-test-prd:
    name: Smoke Tests (Production)
    runs-on: ubuntu-latest
    needs: deploy-prd
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production

    steps:
      - name: Verify health endpoint returns 200
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://armouredsouls.com/api/health")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Health endpoint returned $HTTP_STATUS (expected 200)"
            exit 1
          fi
          echo "Health endpoint OK (200)"

      - name: Verify frontend loads (HTTP 200 on /)
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://armouredsouls.com/")
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "Frontend returned $HTTP_STATUS (expected 200)"
            exit 1
          fi
          echo "Frontend OK (200)"

      - name: Verify login API endpoint responds
        run: |
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"smoke@test.invalid","password":"smoketest"}' \
            "https://armouredsouls.com/api/auth/login")
          if [ "$HTTP_STATUS" -ge 500 ]; then
            echo "Login API returned $HTTP_STATUS (server error)"
            exit 1
          fi
          echo "Login API responding (HTTP $HTTP_STATUS)"
