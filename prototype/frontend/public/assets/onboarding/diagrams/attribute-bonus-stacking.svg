<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <title>Attribute Bonus Stacking</title>
  <rect width="500" height="300" fill="#1a1a2e" rx="8"/>
  <rect x="10" y="10" width="480" height="280" fill="none" stroke="#0f3460" stroke-width="2" rx="6"/>
  <!-- Title -->
  <text x="250" y="40" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="18" font-weight="bold">Attribute Bonus Stacking</text>
  <!-- Y-axis -->
  <line x1="80" y1="60" x2="80" y2="230" stroke="#0f3460" stroke-width="1.5"/>
  <text x="40" y="150" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="11" transform="rotate(-90 40 150)">Stat Value</text>
  <!-- X-axis -->
  <line x1="80" y1="230" x2="460" y2="230" stroke="#0f3460" stroke-width="1.5"/>
  <!-- Bar 1: Attack -->
  <rect x="110" y="160" width="60" height="70" fill="#0f3460" rx="2"/>
  <rect x="110" y="130" width="60" height="30" fill="#e94560" rx="2" opacity="0.7"/>
  <rect x="110" y="110" width="60" height="20" fill="#e94560" rx="2" opacity="0.4"/>
  <text x="140" y="245" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="11">Attack</text>
  <!-- Bar 2: Defense -->
  <rect x="200" y="140" width="60" height="90" fill="#0f3460" rx="2"/>
  <rect x="200" y="115" width="60" height="25" fill="#e94560" rx="2" opacity="0.7"/>
  <rect x="200" y="100" width="60" height="15" fill="#e94560" rx="2" opacity="0.4"/>
  <text x="230" y="245" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="11">Defense</text>
  <!-- Bar 3: Speed -->
  <rect x="290" y="150" width="60" height="80" fill="#0f3460" rx="2"/>
  <rect x="290" y="120" width="60" height="30" fill="#e94560" rx="2" opacity="0.7"/>
  <rect x="290" y="105" width="60" height="15" fill="#e94560" rx="2" opacity="0.4"/>
  <text x="320" y="245" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="11">Speed</text>
  <!-- Bar 4: Accuracy -->
  <rect x="380" y="170" width="60" height="60" fill="#0f3460" rx="2"/>
  <rect x="380" y="145" width="60" height="25" fill="#e94560" rx="2" opacity="0.7"/>
  <rect x="380" y="130" width="60" height="15" fill="#e94560" rx="2" opacity="0.4"/>
  <text x="410" y="245" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="11">Accuracy</text>
  <!-- Legend -->
  <rect x="120" y="265" width="12" height="12" fill="#0f3460" rx="2"/>
  <text x="138" y="276" fill="#eee" font-family="Arial, sans-serif" font-size="10">Base Stats</text>
  <rect x="220" y="265" width="12" height="12" fill="#e94560" rx="2" opacity="0.7"/>
  <text x="238" y="276" fill="#eee" font-family="Arial, sans-serif" font-size="10">Weapon Bonus</text>
  <rect x="340" y="265" width="12" height="12" fill="#e94560" rx="2" opacity="0.4"/>
  <text x="358" y="276" fill="#eee" font-family="Arial, sans-serif" font-size="10">Loadout Bonus</text>
</svg>