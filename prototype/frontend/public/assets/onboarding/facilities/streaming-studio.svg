<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <title>Streaming Studio</title>
  <rect width="64" height="64" fill="#1a1a2e" rx="8"/>
  <!-- Camera body -->
  <rect x="12" y="20" width="30" height="22" fill="#0f3460" rx="3"/>
  <!-- Lens -->
  <circle cx="27" cy="31" r="7" fill="none" stroke="#e94560" stroke-width="2"/>
  <circle cx="27" cy="31" r="3" fill="#e94560"/>
  <!-- Viewfinder -->
  <rect x="42" y="22" width="12" height="10" fill="#0f3460" rx="2"/>
  <line x1="42" y1="27" x2="30" y2="27" stroke="#0f3460" stroke-width="0"/>
  <!-- Broadcast waves -->
  <path d="M44 46 Q50 42 56 46" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.5"/>
  <path d="M42 50 Q50 44 58 50" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.7"/>
  <path d="M40 54 Q50 46 60 54" fill="none" stroke="#e94560" stroke-width="1.5" opacity="0.9"/>
  <!-- REC dot -->
  <circle cx="17" cy="25" r="2" fill="#e94560"/>
</svg>