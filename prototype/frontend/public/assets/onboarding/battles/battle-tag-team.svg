  <line x1="78" y1="215" x2="172" y2="215" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
  <line x1="428" y1="215" x2="522" y2="215" stroke="#e94560" stroke-width="1.5" opacity="0.4"/>
  <!-- Text -->
  <text x="300" y="290" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Tag Team Battle</text>
