<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <title>Tournament</title>
  <rect width="600" height="400" fill="#1a1a2e" rx="8"/>
  <rect x="10" y="10" width="580" height="380" fill="none" stroke="#0f3460" stroke-width="2" rx="6"/>
  <!-- Tournament bracket - Left side -->
  <!-- Round 1 matches -->
  <rect x="40" y="60" width="90" height="28" fill="#0f3460" rx="4"/>
  <rect x="40" y="100" width="90" height="28" fill="#0f3460" rx="4"/>
  <rect x="40" y="180" width="90" height="28" fill="#0f3460" rx="4"/>
  <rect x="40" y="220" width="90" height="28" fill="#0f3460" rx="4"/>
  <!-- Round 1 connectors -->
  <line x1="130" y1="74" x2="160" y2="74" stroke="#e94560" stroke-width="1.5"/>
  <line x1="130" y1="114" x2="160" y2="114" stroke="#e94560" stroke-width="1.5"/>
  <line x1="160" y1="74" x2="160" y2="114" stroke="#e94560" stroke-width="1.5"/>
  <line x1="160" y1="94" x2="180" y2="94" stroke="#e94560" stroke-width="1.5"/>
  <line x1="130" y1="194" x2="160" y2="194" stroke="#e94560" stroke-width="1.5"/>
  <line x1="130" y1="234" x2="160" y2="234" stroke="#e94560" stroke-width="1.5"/>
  <line x1="160" y1="194" x2="160" y2="234" stroke="#e94560" stroke-width="1.5"/>
  <line x1="160" y1="214" x2="180" y2="214" stroke="#e94560" stroke-width="1.5"/>
  <!-- Semi-finals -->
  <rect x="180" y="80" width="90" height="28" fill="#0f3460" rx="4"/>
  <rect x="180" y="200" width="90" height="28" fill="#0f3460" rx="4"/>
  <!-- Semi connectors -->
  <line x1="270" y1="94" x2="300" y2="94" stroke="#e94560" stroke-width="1.5"/>
  <line x1="270" y1="214" x2="300" y2="214" stroke="#e94560" stroke-width="1.5"/>
  <line x1="300" y1="94" x2="300" y2="214" stroke="#e94560" stroke-width="1.5"/>
  <line x1="300" y1="154" x2="320" y2="154" stroke="#e94560" stroke-width="1.5"/>
  <!-- Final -->
  <rect x="320" y="140" width="100" height="28" fill="#e94560" rx="4" opacity="0.8"/>
  <text x="370" y="159" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="12" font-weight="bold">CHAMPION</text>
  <!-- Right side bracket (mirror) -->
  <rect x="470" y="60" width="90" height="28" fill="#0f3460" rx="4"/>
  <rect x="470" y="100" width="90" height="28" fill="#0f3460" rx="4"/>
  <rect x="470" y="180" width="90" height="28" fill="#0f3460" rx="4"/>
  <rect x="470" y="220" width="90" height="28" fill="#0f3460" rx="4"/>
  <line x1="470" y1="74" x2="440" y2="74" stroke="#e94560" stroke-width="1.5"/>
  <line x1="470" y1="114" x2="440" y2="114" stroke="#e94560" stroke-width="1.5"/>
  <line x1="440" y1="74" x2="440" y2="114" stroke="#e94560" stroke-width="1.5"/>
  <line x1="440" y1="94" x2="420" y2="94" stroke="#e94560" stroke-width="1.5"/>
  <line x1="470" y1="194" x2="440" y2="194" stroke="#e94560" stroke-width="1.5"/>
  <line x1="470" y1="234" x2="440" y2="234" stroke="#e94560" stroke-width="1.5"/>
  <line x1="440" y1="194" x2="440" y2="234" stroke="#e94560" stroke-width="1.5"/>
  <line x1="440" y1="214" x2="420" y2="214" stroke="#e94560" stroke-width="1.5"/>
  <rect x="330" y="80" width="90" height="28" fill="#0f3460" rx="4"/>
  <rect x="330" y="200" width="90" height="28" fill="#0f3460" rx="4"/>
  <line x1="330" y1="94" x2="300" y2="94" stroke="#e94560" stroke-width="0"/>
  <!-- Placeholder labels -->
  <text x="85" y="78" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="10" opacity="0.6">Match 1</text>
  <text x="85" y="118" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="10" opacity="0.6">Match 2</text>
  <text x="85" y="198" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="10" opacity="0.6">Match 3</text>
  <text x="85" y="238" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="10" opacity="0.6">Match 4</text>
  <!-- Text -->
  <text x="300" y="320" text-anchor="middle" fill="#eee" font-family="Arial, sans-serif" font-size="28" font-weight="bold">Tournament</text>
  <text x="300" y="370" text-anchor="middle" fill="#e94560" font-family="Arial, sans-serif" font-size="14">600 × 400 — Placeholder</text>
</svg>