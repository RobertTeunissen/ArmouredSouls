<svg xmlns="http://www.w3.org/2000/svg" width="500" height="300" viewBox="0 0 500 300">
  <defs>
    <linearGradient id="bg-abs" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="500" height="300" rx="12" fill="url(#bg-abs)" />
  <rect width="500" height="300" rx="12" fill="none" stroke="#3B82F6" stroke-width="1" opacity="0.3" />
  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" fill="#93C5FD" font-family="sans-serif" font-size="16" font-weight="bold">How Attribute Bonuses Stack</text>

  <!-- Step 1: Base Attribute -->
  <rect x="30" y="55" width="120" height="70" rx="8" fill="#374151" stroke="#6B7280" stroke-width="1" />
  <text x="90" y="75" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="10">Base Attribute</text>
  <text x="90" y="105" text-anchor="middle" fill="#F9FAFB" font-family="sans-serif" font-size="24" font-weight="bold">10</text>

  <!-- Arrow 1 -->
  <text x="168" y="95" text-anchor="middle" fill="#6B7280" font-family="sans-serif" font-size="20">+</text>

  <!-- Step 2: Weapon Bonus -->
  <rect x="190" y="55" width="120" height="70" rx="8" fill="#1E3A5F" stroke="#3B82F6" stroke-width="1" />
  <text x="250" y="75" text-anchor="middle" fill="#60A5FA" font-family="sans-serif" font-size="10">Weapon Bonus</text>
  <text x="250" y="105" text-anchor="middle" fill="#60A5FA" font-family="sans-serif" font-size="24" font-weight="bold">+3</text>

  <!-- Arrow 2 -->
  <text x="328" y="95" text-anchor="middle" fill="#6B7280" font-family="sans-serif" font-size="20">×</text>

  <!-- Step 3: Loadout Multiplier -->
  <rect x="350" y="55" width="120" height="70" rx="8" fill="#1A3A2E" stroke="#10B981" stroke-width="1" />
  <text x="410" y="75" text-anchor="middle" fill="#34D399" font-family="sans-serif" font-size="10">Loadout Bonus</text>
  <text x="410" y="105" text-anchor="middle" fill="#34D399" font-family="sans-serif" font-size="24" font-weight="bold">1.10×</text>

  <!-- Equals line -->
  <line x1="50" y1="150" x2="450" y2="150" stroke="#4B5563" stroke-width="1" stroke-dasharray="4 3" />

  <!-- Result -->
  <rect x="140" y="165" width="220" height="55" rx="8" fill="#1A2E1A" stroke="#10B981" stroke-width="1.5" />
  <text x="250" y="185" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">Effective Stat</text>
  <text x="250" y="210" text-anchor="middle" fill="#10B981" font-family="sans-serif" font-size="22" font-weight="bold">(10 + 3) × 1.10 = 14</text>

  <!-- Formula explanation -->
  <text x="250" y="250" text-anchor="middle" fill="#9CA3AF" font-family="sans-serif" font-size="11">Example: Combat Power with Two-Handed loadout (+10%)</text>
  <text x="250" y="270" text-anchor="middle" fill="#6B7280" font-family="sans-serif" font-size="10">Complementary weapons and loadouts maximize total attributes</text>

  <!-- Decorative corners -->
  <circle cx="25" cy="25" r="3" fill="#3B82F6" opacity="0.3" />
  <circle cx="475" cy="25" r="3" fill="#3B82F6" opacity="0.3" />
  <circle cx="25" cy="275" r="3" fill="#3B82F6" opacity="0.3" />
  <circle cx="475" cy="275" r="3" fill="#3B82F6" opacity="0.3" />
</svg>
