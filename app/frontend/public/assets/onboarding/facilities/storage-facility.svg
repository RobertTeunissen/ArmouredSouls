<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <title>Storage Facility</title>
  <rect width="64" height="64" fill="#1a1a2e" rx="8"/>
  <!-- Main box -->
  <rect x="14" y="22" width="36" height="28" fill="#0f3460" rx="3"/>
  <!-- Box flaps (open) -->
  <path d="M14 22 L22 14 L32 20 L14 22 Z" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <path d="M50 22 L42 14 L32 20 L50 22 Z" fill="#16213e" stroke="#0f3460" stroke-width="1.5"/>
  <!-- Box details -->
  <line x1="32" y1="22" x2="32" y2="50" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>
  <line x1="14" y1="36" x2="50" y2="36" stroke="#e94560" stroke-width="1.5" stroke-dasharray="3,2"/>
  <!-- Small boxes stacked -->
  <rect x="18" y="40" width="10" height="8" fill="none" stroke="#e94560" stroke-width="1.5" rx="1"/>
  <rect x="36" y="40" width="10" height="8" fill="none" stroke="#e94560" stroke-width="1.5" rx="1"/>
</svg>